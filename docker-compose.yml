services:
  mysql:
    image: mysql:8
    container_name: mysql-payment
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_gateway
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateways:
    image: matheusprotzen/gateways-mock
    container_name: gateways
    environment:
      REMOVE_AUTH: 'false'
    ports:
      - "3001:3001"
      - "3002:3002"

  app:
    build: .
    container_name: payment-api
    command: npm run dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=docker
      - DB_HOST=mysql
      - HOST=0.0.0.0
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      gateways:
        condition: service_started

volumes:
  mysql_data:
